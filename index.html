<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batman AI Assistant</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; max-width: 80%; }
        .bot { background: #333; align-self: flex-start; }
        .user { background: #007bff; align-self: flex-end; margin-right: auto; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div style="padding: 10px; background: #1f1f1f; display: flex;">
        <input type="text" id="in" style="flex: 1; padding: 10px; border-radius: 5px; border: none;">
        <button onclick="send()" style="margin-left: 5px;">إرسال</button>
    </div>
    <script>
        function send() {
            let i = document.getElementById('in');
            if(!i.value) return;
            document.getElementById('chat').innerHTML += `<div class="msg user">${i.value}</div>`;
            let val = i.value; i.value = '';
            setTimeout(() => {
                document.getElementById('chat').innerHTML += `<div class="msg bot">أنا باتمان، أسمعك بوضوح بخصوص: ${val}</div>`;
            }, 1000);
        }
    </script>
</body>
</html>
