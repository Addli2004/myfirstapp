<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batman Gemini AI</title>
    <style>
        :root {
            --bg-color: #131314;
            --container-bg: #1e1f20;
            --text-color: #e3e3e3;
            --accent-color: #8ab4f8;
            --user-msg-bg: #2b2c2f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Google Sans', Segoe UI, Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        #header { 
            padding: 15px 20px; 
            font-size: 18px; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            background: rgba(19, 19, 20, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #header img { width: 28px; height: 28px; }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px;
            scroll-behavior: smooth;
        }

        .msg { 
            max-width: 85%; 
            font-size: 16px; 
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg { 
            align-self: flex-start; 
            background-color: var(--user-msg-bg);
            padding: 12px 16px;
            border-radius: 18px;
            color: #fff;
            margin-bottom: 5px;
        }

        .bot-msg { 
            align-self: flex-start; 
            width: 100%;
            display: flex;
            gap: 12px;
        }

        .bot-content {
            flex: 1;
            color: #c4c7c5;
        }

        .bot-icon {
            width: 30px;
            height: 30px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* شريط الكتابة Gemini Style */
        .input-area { 
            padding: 10px 16px 24px 16px;
        }

        .input-container { 
            background-color: var(--container-bg); 
            border-radius: 32px; 
            display: flex; 
            align-items: center; 
            padding: 6px 14px;
            transition: box-shadow 0.2s;
        }

        .input-container:focus-within {
            box-shadow: 0 0 0 1px #5f6368;
        }

        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 12px 8px; 
            font-size: 16px; 
            outline: none; 
            text-align: right;
        }

        .send-btn { 
            background: transparent; 
            border: none; 
            color: var(--accent-color); 
            font-size: 22px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .typing { 
            font-size: 13px; 
            color: var(--accent-color); 
            margin-bottom: 8px; 
            margin-right: 20px;
            display: none; 
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="header">
        <img src="https://img.icons8.com/ios-filled/50/8ab4f8/batman-logo.png" alt="logo">
        <span>Batman Gemini</span>
    </div>

    <div id="chat-box"></div>
    
    <div id="typing-indicator" class="typing">باتمان يحلل البيانات...</div>

    <div class="input-area">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="اسأل باتمان جمناي..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typing-indicator');

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type === 'user' ? 'user-msg' : 'bot-msg'}`;
            
            if (type === 'user') {
                msgDiv.innerText = text;
            } else {
                msgDiv.innerHTML = `
                    <div class="bot-icon">🦇</div>
                    <div class="bot-content">${text}</div>
                `;
            }
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const val = userInput.value.trim();
            if (!val) return;

            addMessage(val, 'user');
            userInput.value = '';
            
            typingIndicator.style.display = 'block';

            setTimeout(() => {
                typingIndicator.style.display = 'none';
                const response = getSmartResponse(val);
                addMessage(response, 'bot');
            }, 1200);
        }

        function getSmartResponse(input) {
            input = input.toLowerCase();
            
            // قاموس الردود الذكي (عراقي + فصحى + إنجليزي)
            const responses = {
                "شلونك": "أنا بخير وبكامل جهوزيتي، عساك بخير يا طيب؟ شكراً لسؤالك، أنا دائماً موجود لحمايتك ومساعدتك.",
                "شخبارك": "أنا بخير، المهم إنت تكون بخير. شلون أقدر أساعدك اليوم بمدينة غوثام؟",
                "كيف حالك": "أنا دائماً على أتم الاستعداد لخدمتك. شكراً لسؤالك اللطيف، هذا يعني لي الكثير.",
                "شكو ماكو": "صافية دافية! ماكو شي جديد غير إني مستعد أسمعك وأساعدك بأي شي تحتاجه.",
                "من انت": "أنا باتمان جمناي، مساعدك الذكي المتطور. صُممت حتى أكون سندك ودرعك الرقمي في هذا العالم.",
                "انت منو": "أنا باتمان، حامي العدالة في غوثام ومساعدك الشخصي هنا.",
                "شكرا": "تدلل، هذا واجبي! أنا هنا دائماً بالخدمة. إذا عندك شي ثاني ببالك، لا تتردد.",
                "تسلم": "الله يسلمك ويحفظك من كل شر. محتاج مساعدة بأي شي ثاني؟",
                "عاشت ايدك": "وايدك العايشة! أنا بالخدمة دائماً.",
                "مرحبا": "يا هلا بيك! نورت المحادثة. شلون أقدر أخدمك اليوم؟",
                "هلا": "هلا بيك وبكل أهلنا بالعراق! شلون أقدر أساعدك؟",
                "هلو": "هلو عيني، نورت. شنو ببالك اليوم؟ أنا أسمعك.",
                "تعبان": "سلامتك من التعب يا بطل. ارتاح وخلي المهام الصعبة عليّ. أنا هنا لأسمعك وأساندك.",
                "ضايج": "لا تضوج، تذكر إن 'الليل أحلك ما يكون قبل الفجر'. أنا موجود إذا تحب تحجي أو تفضفض.",
                "احبك": "شكراً لمشاعرك النبيلة! كباتمان، واجبي إني أحمي وأساعد الناس الطيبين مثلك. ثقتك هي أكبر دافع لي.",
                "ساعدني": "أبشر، أنا موجود! بس قولي شنو المشكلة أو شنو اللي محتاجه بالضبط، وسأبذل كل جهدي لحلها.",
                "وينك": "أنا دائماً موجود بالظلال، أو بالأحرى بجهازك! مستعد بأي لحظة تطلبني فيها.",
                "how are you": "I'm vigilant and focused on your safety. Thank you for asking. How can I help you today?",
                "who are you": "I am Batman Gemini, your intelligent guardian and personal assistant.",
                "thank": "You are very welcome. It's an honor to be of service.",
                "hello": "Greetings! I'm ready for duty. What's on your mind?",
                "hi": "Hello there! How can I assist you today?",
                "help": "Tell me what's wrong. I have the resources and the will to help you overcome any challenge."
            };

            // البحث عن تطابق الكلمات
            for (let key in responses) {
                if (input.includes(key)) return responses[key];
            }

            return "فهمت قصدك بخصوص '" + input + "'. بصفتي باتمان، أشوف إن هذا الموضوع يحتاج تفكير عميق. تقدر تحجيلي تفاصيل أكثر حتى أجاوبك بدقة؟";
        }

        window.onload = () => {
            setTimeout(() => {
                addMessage("مرحباً بك، أنا باتمان جمناي. شلون أقدر أساعدك اليوم؟", "bot");
            }, 500);
        };

        userInput.addEventListener("keypress", (e) => {
            if(e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
