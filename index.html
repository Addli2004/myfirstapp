<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batman Gemini AI</title>
    <style>
        :root {
            --bg-color: #131314;
            --container-bg: #1e1f20;
            --text-color: #e3e3e3;
            --accent-color: #8ab4f8;
            --user-msg-bg: #2b2c2f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Google Sans', Segoe UI, Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        #header { 
            padding: 15px 20px; 
            font-size: 18px; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            background: rgba(19, 19, 20, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #header img { width: 28px; height: 28px; }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px;
            scroll-behavior: smooth;
        }

        .msg { 
            max-width: 85%; 
            font-size: 16px; 
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg { 
            align-self: flex-start; 
            background-color: var(--user-msg-bg);
            padding: 12px 16px;
            border-radius: 18px;
            color: #fff;
        }

        .bot-msg { 
            align-self: flex-start; 
            width: 100%;
            display: flex;
            gap: 12px;
        }

        .bot-content { flex: 1; color: #c4c7c5; }

        .bot-icon {
            width: 30px; height: 30px;
            background: #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }

        .input-area { padding: 10px 16px 24px 16px; }

        .input-container { 
            background-color: var(--container-bg); 
            border-radius: 32px; 
            display: flex; align-items: center; 
            padding: 6px 14px;
            transition: box-shadow 0.2s;
        }

        .input-container:focus-within { box-shadow: 0 0 0 1px #5f6368; }

        input { 
            flex: 1; background: transparent; border: none; 
            color: white; padding: 12px 8px; font-size: 16px; 
            outline: none; text-align: right;
        }

        .send-btn { 
            background: transparent; border: none;
            color: var(--accent-color); font-size: 22px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            padding: 8px; transition: opacity 0.2s;
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .typing { 
            font-size: 13px; color: var(--accent-color); 
            margin-bottom: 8px; margin-right: 20px;
            display: none; font-style: italic;
        }

        .bot-content strong { color: #fff; }
        .bot-content code {
            background: #2b2c2f; padding: 2px 6px;
            border-radius: 4px; font-family: monospace;
            font-size: 13px; color: #8ab4f8;
        }
        .bot-content pre {
            background: #1a1b1e; border: 1px solid #333;
            border-radius: 10px; padding: 14px;
            overflow-x: auto; direction: ltr; text-align: left;
        }
        .bot-content pre code { background: transparent; padding: 0; color: #c4c7c5; }
        .bot-content ul, .bot-content ol { padding-right: 20px; padding-left: 0; }
        .bot-content p { margin: 6px 0; }
    </style>
</head>
<body>

    <div id="header">
        <img src="https://img.icons8.com/ios-filled/50/8ab4f8/batman-logo.png" alt="logo">
        <span>Batman Gemini</span>
    </div>

    <div id="chat-box"></div>
    <div id="typing-indicator" class="typing">باتمان يحلل البيانات...</div>

    <div class="input-area">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="اسأل باتمان جمناي..." autocomplete="off">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDZHo1tI5-JsiZDyZS3Gtfr_k4BFFiYafQ";
        const API_URL = https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY};

        const BATMAN_PROMPT = `أنت باتمان جمناي — مساعد ذكي بشخصية باتمان. 
تجاوب على أي سؤال بأي موضوع (علوم، تاريخ، برمجة، نصائح، ترفيه، وغيرها) بشكل مفيد ودقيق.
تتكلم بالعربي العراقي بشكل طبيعي، وأحياناً تضيف لمسة باتمان.
ردودك واضحة ومنظمة. إذا السؤال بالإنجليزي رد بالإنجليزي.`;

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typing-indicator');
        const sendBtn = document.getElementById('sendBtn');
        const history = [];

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = msg ${type === 'user' ? 'user-msg' : 'bot-msg'};
            if (type === 'user') {
                msgDiv.innerText = text;
            } else {
                msgDiv.innerHTML = `
                    <div class="bot-icon">🦇</div>
                    <div class="bot-content">${formatMarkdown(text)}</div>
                `;
            }
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function formatMarkdown(text) {
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const val = userInput.value.trim();
            if (!val) return;

            addMessage(val, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            typingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            history.push({ role: "user", parts: [{ text: val }] });

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: BATMAN_PROMPT }] },
                        contents: history,
                        generationConfig: { temperature: 0.8, maxOutputTokens: 1024 }
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || 'خطأ بالسيرفر');

                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'ما قدرت أجاوب، حاول مرة ثانية.';
                history.push({ role: "model", parts: [{ text: reply }] });

                typingIndicator.style.display = 'none';addMessage(reply, 'bot');

            } catch(e) {
                typingIndicator.style.display = 'none';
                addMessage('⚠️ صار خطأ: ' + e.message, 'bot');
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        window.onload = () => {
            setTimeout(() => {
                addMessage("مرحباً بك، أنا باتمان جمناي. سلني عن أي شي — برمجة، علوم، تاريخ، أو أي شي ببالك! 🦇", "bot");
            }, 500);
        };

        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
